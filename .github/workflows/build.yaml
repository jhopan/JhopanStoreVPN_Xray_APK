name: Android Multi ABI Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      LIBXRAY_AAR_URL: https://github.com/jhopan/JhopanStoreVPN_Xray_APK/releases/download/binary-assets/libXray.aar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Build phone release
        run: ./gradlew assemblePhoneRelease

      - name: Build full release
        run: ./gradlew assembleFullRelease

      - name: Upload v8a (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-v8a-arm64-v8a
          path: app/build/outputs/apk/phone/release/app-phone-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload v7 (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-v7-armeabi-v7a
          path: app/build/outputs/apk/phone/release/app-phone-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload amd (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-amd-x86_64
          path: app/build/outputs/apk/full/release/app-full-x86_64-release.apk
          if-no-files-found: error

      - name: Upload universal (all ABIs)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-universal-all-abis
          path: app/build/outputs/apk/full/release/app-full-universal-release.apk
          if-no-files-found: error

      - name: Upload universal android (phone universal)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-universal-android-phone
          path: app/build/outputs/apk/phone/release/app-phone-universal-release.apk
          if-no-files-found: error

      - name: Upload x86 (optional legacy)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-x86-legacy
          path: app/build/outputs/apk/full/release/app-full-x86-release.apk
          if-no-files-found: ignore

      - name: Upload libXray used in build
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN-libXray-aar
          path: app/libs/libXray.aar
          if-no-files-found: error

      - name: Prepare release filenames (JhopanStoreVPN)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist/release
          cp app/build/outputs/apk/phone/release/app-phone-arm64-v8a-release.apk dist/release/JhopanStoreVPN-phone-arm64-v8a-release.apk
          cp app/build/outputs/apk/phone/release/app-phone-armeabi-v7a-release.apk dist/release/JhopanStoreVPN-phone-armeabi-v7a-release.apk
          cp app/build/outputs/apk/phone/release/app-phone-universal-release.apk dist/release/JhopanStoreVPN-phone-universal-release.apk
          cp app/build/outputs/apk/full/release/app-full-x86_64-release.apk dist/release/JhopanStoreVPN-full-x86_64-release.apk
          cp app/build/outputs/apk/full/release/app-full-universal-release.apk dist/release/JhopanStoreVPN-full-universal-release.apk
          cp app/libs/libXray.aar dist/release/JhopanStoreVPN-libXray.aar

      - name: Publish tagged release assets (APK + lib)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/JhopanStoreVPN-phone-arm64-v8a-release.apk
            dist/release/JhopanStoreVPN-phone-armeabi-v7a-release.apk
            dist/release/JhopanStoreVPN-phone-universal-release.apk
            dist/release/JhopanStoreVPN-full-x86_64-release.apk
            dist/release/JhopanStoreVPN-full-universal-release.apk
            dist/release/JhopanStoreVPN-libXray.aar
